name: gymgeek
description: AI-Intensive Fitness Guidance System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.1.2

  # TensorFlow Lite
  tflite_flutter: ^0.10.4

  # Local Storage
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

  # Network
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # URL launcher (for YouTube videos)
  url_launcher: ^6.3.0

  # UI
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1

  # Image processing for TFLite
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/equipment.json
    - assets/research.json

  # Uncomment once you add the model files:
  # - assets/model.tflite
  # - assets/labels.txt
